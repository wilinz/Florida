name: Florida arm64 (artifact)

on:
  workflow_dispatch:

jobs:
  android_build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Get frida version
      id: ver
      run: echo "FRIDA_VERSION=17.15.0" >> $GITHUB_OUTPUT

    - uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r29
        local-cache: false
        link-to-sdk: true

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: install dependencies
      run: |
        sudo apt-get update && DEBIAN_FRONTEND=noninteractive sudo apt-get install build-essential tree ninja-build gcc-multilib g++-multilib lib32stdc++-9-dev flex bison ruby ruby-dev python3-requests python3-setuptools python3-dev python3-pip libc6-dev libc6-dev-i386 -y
        sudo gem install fpm -v 1.11.0 --no-document
        python3 -m pip install lief

    - name: build frida for Android (arm64 only)
      shell: bash
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
        echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"

        git clone --recurse-submodules https://github.com/frida/frida
        cd frida
        FRIDA_BUILT_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo unknown)
        echo "FRIDA_BUILT_VERSION=$FRIDA_BUILT_VERSION" >> $GITHUB_ENV
        for path in ../patches/*
        do
          name=$(basename $path)
          real=$(realpath $path)
          echo "Apply patches in $real to frida/subprojects/$name"
          cd subprojects/$name
          git am --3way ../../../patches/$name/*.patch
          cd ../..
        done
        cd ..

        mkdir build-android-arm64
        cd build-android-arm64
        ../frida/configure --host=android-arm64
        make
        cd ..

        cp build-android-arm64/subprojects/frida-core/server/frida-server florida-server-${{ steps.ver.outputs.FRIDA_VERSION }}-android-arm64
        cp build-android-arm64/subprojects/frida-core/inject/frida-inject florida-inject-${{ steps.ver.outputs.FRIDA_VERSION }}-android-arm64
        cp build-android-arm64/subprojects/frida-core/lib/gadget/frida-gadget.so florida-gadget-${{ steps.ver.outputs.FRIDA_VERSION }}-android-arm64.so

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: florida-arm64-${{ steps.ver.outputs.FRIDA_VERSION }}
        path: |
          florida-server-*-android-arm64
          florida-inject-*-android-arm64
          florida-gadget-*-android-arm64.so
        retention-days: 7
